name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build iOS App
        run: |
          cd MusicPlayer

          # 创建 Xcode 项目文件
          xcodebuild -project MusicPlayer.xcodeproj \
            -scheme MusicPlayer \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MusicPlayer.xcarchive \
            archive

      - name: Export IPA
        run: |
          cd MusicPlayer

          # 创建导出配置
          mkdir -p ExportOptions
          cat > ExportOptions/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string></string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
          </dict>
          </plist>
          EOF

          # 导出 IPA
          xcodebuild -exportArchive \
            -archivePath build/MusicPlayer.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions/ExportOptions.plist \
            -allowProvisioningUpdates || echo "Export may require signing"

      - name: Create unsigned IPA
        run: |
          cd MusicPlayer

          # 如果上面的签名导出失败，创建未签名的 IPA
          if [ ! -f build/ipa/*.ipa ]; then
            echo "Creating unsigned IPA..."

            # 使用模拟器版本创建框架
            xcodebuild -project MusicPlayer.xcodeproj \
              -scheme MusicPlayer \
              -configuration Release \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              -derivedDataPath build/DerivedData \
              build

            # 创建 IPA 结构
            mkdir -p build/Payload
            APP_PATH=$(find build/DerivedData -name "MusicPlayer.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              cp -r "$APP_PATH" build/Payload/
              cd build
              zip -r ../MusicPlayer.ipa Payload
              cd ..
              echo "IPA created: MusicPlayer.ipa"
            fi
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-IPA
          path: |
            MusicPlayer.ipa
            MusicPlayer/build/ipa/*.ipa
          retention-days: 7

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MusicPlayer v1.0.${{ github.run_number }}
          files: |
            MusicPlayer.ipa
            MusicPlayer/build/ipa/*.ipa
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
