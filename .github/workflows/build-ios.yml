name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    permissions:
      contents: write
      packages: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build iOS App (No Signing Required)
        run: |
          xcodebuild -project MusicPlayer.xcodeproj \
            -scheme MusicPlayer \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_LDFLAGS="-framework CarPlay" \
            build

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/DerivedData -name "MusicPlayer.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" build/Payload/
            cd build && zip -r ../MusicPlayer.ipa Payload
            echo "IPA created successfully: MusicPlayer.ipa"
          else
            echo "Error: MusicPlayer.app not found"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-IPA
          path: MusicPlayer.ipa
          retention-days: 7

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MusicPlayer v1.0.${{ github.run_number }}
          files: MusicPlayer.ipa
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}